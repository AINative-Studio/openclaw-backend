<svg xmlns="http://www.w3.org/2000/svg" width="320" height="64" viewBox="0 0 320 64" role="img" aria-label="Agent Swarm logo with text">
  <title>Agent Swarm - Multi-agent orchestration platform</title>

  <!-- Bee icon (scaled from 16x16 to 64x64, positioned at left) -->
  <g transform="translate(0, 0) scale(4)">
    <!-- Antennae -->
    <g fill="#2d1810">
      <rect x="5" y="1" width="1" height="1"/>
      <rect x="6" y="2" width="1" height="1"/>
      <rect x="10" y="1" width="1" height="1"/>
      <rect x="9" y="2" width="1" height="1"/>
    </g>
    <!-- Head outline -->
    <g fill="#3a2416">
      <rect x="5" y="3" width="6" height="1"/>
      <rect x="4" y="4" width="1" height="1"/>
      <rect x="11" y="4" width="1" height="1"/>
      <rect x="4" y="5" width="1" height="1"/>
      <rect x="11" y="5" width="1" height="1"/>
    </g>
    <!-- Head fill -->
    <g fill="#FFB300">
      <rect x="5" y="4" width="6" height="1"/>
      <rect x="5" y="5" width="6" height="1"/>
    </g>
    <!-- Eyes -->
    <g fill="#1a1a1a">
      <rect x="6" y="4" width="1" height="1"/>
      <rect x="9" y="4" width="1" height="1"/>
    </g>
    <g fill="#ffffff" opacity="0.4">
      <rect x="6" y="3" width="1" height="1"/>
      <rect x="9" y="3" width="1" height="1"/>
    </g>
    <!-- Body outline -->
    <g fill="#3a2416">
      <rect x="4" y="6" width="1" height="1"/>
      <rect x="11" y="6" width="1" height="1"/>
      <rect x="3" y="7" width="1" height="2"/>
      <rect x="12" y="7" width="1" height="2"/>
      <rect x="3" y="9" width="1" height="1"/>
      <rect x="12" y="9" width="1" height="1"/>
      <rect x="4" y="10" width="1" height="1"/>
      <rect x="11" y="10" width="1" height="1"/>
      <rect x="5" y="11" width="6" height="1"/>
    </g>
    <!-- Body segments -->
    <g fill="#FFA500">
      <rect x="5" y="6" width="6" height="1"/>
      <rect x="4" y="7" width="8" height="1"/>
    </g>
    <g fill="#5a3a1a">
      <rect x="4" y="8" width="8" height="1"/>
    </g>
    <g fill="#FFD700">
      <rect x="4" y="9" width="8" height="1"/>
    </g>
    <g fill="#5a3a1a">
      <rect x="5" y="10" width="6" height="1"/>
    </g>
    <!-- Wings -->
    <g fill="#d4e8f7" opacity="0.75">
      <rect x="1" y="7" width="1" height="1"/>
      <rect x="2" y="7" width="2" height="2"/>
      <rect x="2" y="9" width="1" height="1"/>
      <rect x="14" y="7" width="1" height="1"/>
      <rect x="12" y="7" width="2" height="2"/>
      <rect x="13" y="9" width="1" height="1"/>
    </g>
    <g fill="#b0c8d8" opacity="0.5">
      <rect x="1" y="6" width="1" height="1"/>
      <rect x="2" y="6" width="1" height="1"/>
      <rect x="14" y="6" width="1" height="1"/>
      <rect x="13" y="6" width="1" height="1"/>
    </g>
    <!-- Stinger -->
    <g fill="#3a2416">
      <rect x="7" y="12" width="2" height="1"/>
      <rect x="7" y="13" width="2" height="1" opacity="0.7"/>
    </g>
    <!-- Highlights -->
    <g fill="#ffe4b3" opacity="0.3">
      <rect x="5" y="6" width="2" height="1"/>
      <rect x="9" y="6" width="2" height="1"/>
    </g>
  </g>

  <!-- Pixel art text: "AGENT SWARM" -->
  <!-- Each letter is 5 pixels wide, 7 pixels tall, with 1 pixel spacing -->
  <!-- Positioned at x=80, centered vertically -->
  <g fill="#1a1a1a" transform="translate(80, 16) scale(3)">
    <!-- A -->
    <rect x="1" y="1" width="3" height="1"/>
    <rect x="0" y="2" width="1" height="5"/>
    <rect x="4" y="2" width="1" height="5"/>
    <rect x="1" y="4" width="3" height="1"/>

    <!-- G -->
    <rect x="7" y="1" width="4" height="1"/>
    <rect x="6" y="2" width="1" height="5"/>
    <rect x="10" y="2" width="1" height="1"/>
    <rect x="10" y="4" width="1" height="3"/>
    <rect x="7" y="6" width="4" height="1"/>
    <rect x="9" y="4" width="1" height="1"/>

    <!-- E -->
    <rect x="13" y="1" width="4" height="1"/>
    <rect x="12" y="2" width="1" height="5"/>
    <rect x="13" y="4" width="3" height="1"/>
    <rect x="13" y="6" width="4" height="1"/>

    <!-- N -->
    <rect x="19" y="1" width="1" height="6"/>
    <rect x="20" y="2" width="1" height="1"/>
    <rect x="21" y="3" width="1" height="1"/>
    <rect x="22" y="4" width="1" height="1"/>
    <rect x="23" y="1" width="1" height="6"/>

    <!-- T -->
    <rect x="26" y="1" width="5" height="1"/>
    <rect x="28" y="2" width="1" height="5"/>

    <!-- Space (2 pixels) -->

    <!-- S -->
    <rect x="34" y="1" width="4" height="1"/>
    <rect x="33" y="2" width="1" height="2"/>
    <rect x="34" y="4" width="3" height="1"/>
    <rect x="37" y="5" width="1" height="1"/>
    <rect x="34" y="6" width="4" height="1"/>

    <!-- W -->
    <rect x="40" y="1" width="1" height="6"/>
    <rect x="41" y="5" width="1" height="1"/>
    <rect x="42" y="4" width="1" height="2"/>
    <rect x="43" y="5" width="1" height="1"/>
    <rect x="44" y="1" width="1" height="6"/>

    <!-- A -->
    <rect x="47" y="1" width="3" height="1"/>
    <rect x="46" y="2" width="1" height="5"/>
    <rect x="50" y="2" width="1" height="5"/>
    <rect x="47" y="4" width="3" height="1"/>

    <!-- R -->
    <rect x="53" y="1" width="3" height="1"/>
    <rect x="52" y="2" width="1" height="5"/>
    <rect x="56" y="2" width="1" height="2"/>
    <rect x="53" y="4" width="3" height="1"/>
    <rect x="55" y="5" width="1" height="1"/>
    <rect x="56" y="6" width="1" height="1"/>

    <!-- M -->
    <rect x="59" y="1" width="1" height="6"/>
    <rect x="60" y="2" width="1" height="1"/>
    <rect x="61" y="3" width="1" height="1"/>
    <rect x="62" y="2" width="1" height="1"/>
    <rect x="63" y="1" width="1" height="6"/>
  </g>

  <!-- Subtle tagline below in smaller text -->
  <text x="80" y="54" font-family="monospace, 'Courier New', monospace" font-size="10" fill="#666" letter-spacing="1">
    Multi-agent orchestration by AINative
  </text>
</svg>
